general {
    no_fade_in = false
}

background {
    monitor =
    color = rgba(0, 0, 0, 1)
}

label {
    monitor =
    text = $TIME
    color = rgb(ff0055)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgb(ff0055)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    
    # Sharp corners
    rounding = 1
    
    # Square dots
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = 0
    
    outer_color = rgb(ff0055)
    inner_color = rgb(000000)
    font_color = rgb(ff0055)
    
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    
    position = 0, -80
    halign = center
    valign = center
}
